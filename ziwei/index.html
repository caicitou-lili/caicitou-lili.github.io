<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗数排盘 · 基于倪海夏《天纪》</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
  .frame-wrap { width: 100%; height: 100%; position: relative; }
  iframe { width: 100%; height: 100%; border: none; }

<p>  .fallback {<br>    display: none;<br>    position: absolute; top: 0; left: 0; width: 100%; height: 100%;<br>    background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);<br>    color: #e0d8c0;<br>    flex-direction: column;<br>    align-items: center;<br>    justify-content: center;<br>    text-align: center;<br>    padding: 40px;<br>  }</p>
<p>  .overlay {<br>    position: absolute; bottom: 0; left: 0; right: 0;<br>    background: rgba(0,0,0,0.7); color: rgba(255,255,255,0.5);<br>    text-align: center; padding: 8px; font-size: 12px;<br>    z-index: 10; transition: opacity 0.3s;<br>  }<br>  .overlay:hover { opacity: 0.3; }<br>  .overlay a { color: rgba(255,255,255,0.7); }</p>
<p>  .toast {<br>    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);<br>    background: #2a1a3e; color: #e0d0a0; padding: 12px 24px;<br>    border-radius: 8px; z-index: 100; font-size: 14px;<br>    animation: fadeIn 0.3s ease;<br>    box-shadow: 0 4px 20px rgba(0,0,0,0.5);<br>  }<br>  @keyframes fadeIn {<br>    from { opacity: 0; transform: translateX(-50%) translateY(-10px); }<br>    to { opacity: 1; transform: translateX(-50%) translateY(0); }<br>  }<br></style></p>
</head>
<body>
  <div class="frame-wrap">
    <iframe id="mainFrame" 
            src="https://ziwei-30.vercel.app"
            allow="clipboard-write"
            loading="eager"
            title="紫微斗数排盘">
    </iframe>
    <div class="overlay">
      紫微斗数排盘引擎 · 基于倪海夏《天纪》体系 · 
      开源项目 <a href="https://github.com/Renhuai123/ziwei-doushu" target="_blank">GitHub</a> · 
      作者 <a href="https://github.com/Renhuai123" target="_blank">王多鱼AI</a>
    </div>
  </div>

  <div id="fallback" class="fallback">
    <h1 style="font-size:2em;margin-bottom:20px;">🔮 紫微斗数排盘</h1>
    <p style="margin-bottom:12px;">在线排盘引擎加载失败，请直接访问：</p>
    <a href="https://ziwei-30.vercel.app" target="_blank" 
       style="color:#d4a017;font-size:1.2em;text-decoration:none;border:1px solid #d4a017;padding:12px 32px;border-radius:8px;margin:16px 0;">
      打开排盘系统 →
    </a>
    <p style="margin-top:24px;font-size:0.85em;color:rgba(255,255,255,0.5);">
      基于倪海夏《天纪》体系 · 开源项目
    </p>
  </div>

  <script>
    // Show fallback if iframe fails to load after 10 seconds
    var loaded = false;
    var frame = document.getElementById('mainFrame');
    var fallback = document.getElementById('fallback');

    frame.onload = function() { loaded = true; };

    setTimeout(function() {
      if (!loaded) {
        frame.style.display = 'none';
        fallback.style.display = 'flex';
      }
    }, 10000);
  </script>
</body>
</html>
